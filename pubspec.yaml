name: str_app
description: "Screen Time Rewards - Family Task Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # AI
  google_generative_ai: ^0.4.6

  # Screenshot & Sharing
  screenshot: ^3.0.0
  share_plus: ^7.2.2
  path_provider: ^2.1.4
  
  # Charts & Visualization
  fl_chart: ^0.68.0
  
  # Export (PDF/CSV)
  pdf: ^3.10.7
  csv: ^6.0.0
  
  # Internationalization & Date Formatting
  intl: ^0.19.0
  table_calendar: ^3.0.9
  
  # Firebase - UPDATED to fix PigeonUserDetails type cast error
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.6
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.6
  
  # Google Sign-In
  google_sign_in: ^6.2.1
  
  # UI & Rendering
  flutter_markdown: ^0.6.23
  
  # Reward Wheel
  flutter_fortune_wheel: ^1.3.1
  
  # Media & Permissions
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  
  # HTTP & Cache
  http: ^1.2.2
  cached_network_image: ^3.3.0
  
  # Animation
  lottie: ^3.1.2
  
  # Screen Usage Tracking (Android)
  #usage_stats: ^1.0.0
  
  # Local Storage for View Preferences
  shared_preferences: ^2.2.2

  # Local Notifications for Goal Reminders
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true