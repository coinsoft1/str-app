name: str_app
description: "Screen Time Rewards - Family Task Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Internationalization
  intl: ^0.19.0
  table_calendar: ^3.0.9
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  
  # Reward Wheel
  flutter_fortune_wheel: ^1.3.1
  
  # Media & Permissions
  image_picker: ^1.2.1
  permission_handler: ^11.0.0
  
  # HTTP & Cache
  http: ^1.1.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true